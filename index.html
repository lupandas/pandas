        const parseVideoUrl = (url) => {
            if (!url) return { isIframe: false, url: '' };
            let parsedUrl = String(url).trim();

            const iframeMatch = parsedUrl.match(/<iframe.*?src=["'](.*?)["']/i);
            if (iframeMatch) {
                parsedUrl = iframeMatch[1];
            }

            // 智能识别 B站 BV 号 (支持直接填BV号、短链接 b23.tv 或 完整链接)
            const bvMatch = parsedUrl.match(/(BV[1-9A-HJ-NP-Za-km-z]{10})/i);
            if (bvMatch) {
                // 统一转换为 B 站官方 iframe 播放器地址
                parsedUrl = `https://player.bilibili.com/player.html?bvid=${bvMatch[1]}&page=1&high_quality=1&as_wide=1&allowfullscreen=true&autoplay=0`;
            }

            if (parsedUrl.includes('player.bilibili.com') || 
                parsedUrl.includes('youtube.com/embed') || 
                parsedUrl.includes('v.qq.com/txp/iframe')) {
                
                if (parsedUrl.startsWith('//')) {

                return { isIframe: true, url: parsedUrl };

        const ParticlesBackground = ({ color }) => {
          const canvasRef = useRef(null);
          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let particles = [];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            
            class Particle {
              constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
              }
              update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.005;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
              }
              draw() {
                ctx.fillStyle = color || 'rgba(0,0,0,0.1)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
              }
            }
            for(let i=0; i<80; i++) particles.push(new Particle());
            
            const animate = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              particles.forEach(p => { p.update(); p.draw(); });
              animationFrameId = requestAnimationFrame(animate);
            };
            animate();
            return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
          }, [color]);
          return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[-1] opacity-60"></canvas>;
        };

          // 核心逻辑：确认批量写入图片

              }).filter(item => item.url !== '');

              setData(p => {

                      const newItems = parsedData.map((item, i) => ({

          const handleRemoveArrayItem = (arrayName, id) => {

                          } else {

                          }
                          return newData;
                      });
                      setDialog(null);
                  }
              });

          // --- 拖拽排序逻辑 (DnD) ---
          const dragItemNode = useRef(null);
          const dragOverItemNode = useRef(null);

          const handleReorderById = (arrayName, dragId, dropId) => {
              if (dragId === dropId) return;
              setData(p => {
                  let path = arrayName.split('.');
                  let newData = { ...p };
                  let list;
                  if (path.length === 2) {
                      list = [...newData[path[0]][path[1]]];
                  } else {
                      list = [...newData[arrayName]];
                  }

                  const dragIndex = list.findIndex(i => i.id === dragId);
                  const dropIndex = list.findIndex(i => i.id === dropId);

                  if (dragIndex > -1 && dropIndex > -1) {
                      const [removed] = list.splice(dragIndex, 1);
                      list.splice(dropIndex, 0, removed);
                  }

                  if (path.length === 2) {
                      newData[path[0]][path[1]] = list;
                  } else {
                      newData[arrayName] = list;
                  }
                  return newData;
              });
          };

          const handleDragEnter = (e, id, arrayName) => {

              dragOverItemNode.current = { id, arrayName };

              if (!isEditing) return;
              if (e.target && e.target.classList) e.target.classList.remove('opacity-40', 'scale-95');
              if (dragItemNode.current && dragOverItemNode.current && dragItemNode.current.arrayName === dragOverItemNode.current.arrayName) {

              }

              dragOverItemNode.current = null;
          };

              setData(p => {
                  let newData = { ...p };
                  let parentList = [...(newData[type] || [])];
                  let parentIndex = parentList.findIndex(i => i.id === parentId);

                  let mediaList = [...(parentList[parentIndex].media || [])];
                  const dragIndex = mediaList.findIndex(i => i.id === dragId);
                  const dropIndex = mediaList.findIndex(i => i.id === dropId);
                  
                  if (dragIndex > -1 && dropIndex > -1) {

                  parentList[parentIndex] = { ...parentList[parentIndex], media: mediaList };

                                      // 工具函数：根据 ID 智能合并数组，不覆盖已存在的同 ID 项

                                              <button onClick={(e) => {e.stopPropagation(); handleArrayEdit(arrayName, item.id, 'cardSize', 'large')}} className={`w-6 h-6 text-[10px] rounded flex items-center justify-center shadow transition-colors ${item.cardSize==='large'?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>L</button>
                                          </>}
                                      </div>
                                  )}

                                  {isEditing && !item.isAggregated && <button onClick={(e)=>{e.stopPropagation();handleRemoveArrayItem(arrayName, item.id)}} className="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 flex items-center justify-center rounded z-20"><i className="ri-delete-bin-line text-xs"></i></button>}
                                  
                                  <div className={`w-full overflow-hidden relative bg-gray-100 img-hover-zoom ${isMasonry ? 'rounded-t-sm' : 'aspect-[4/3] rounded-sm mb-5'}`}>
                                      {isEditing && !item.isAggregated && (<input className="absolute inset-x-0 bottom-0 text-[10px] p-1 bg-white/90 z-10 w-full" placeholder="封面图片URL" value={item.img} onChange={e=>handleArrayEdit(arrayName,item.id,'img',e.target.value)} onClick={e=>e.stopPropagation()}/>)}
                                      
                                      {isVideoMode && item.vid ? (
                                          parsedVid.isIframe ? (
                                              <div className={`w-full h-full relative opacity-80 group-hover:opacity-100 transition-opacity ${!isMasonry?'aspect-video':''} group-hover:scale-105 duration-700`}>
                                                  {item.img ? (
                                                      <img src={item.img} className="w-full h-full object-cover" />
                                                  ) : (
                                                      <iframe src={parsedVid.url} className="w-full h-full border-0 pointer-events-none" allowFullScreen></iframe>
                                                  )}
                                              </div>
                                          ) : (
                                              <video src={parsedVid.url} poster={item.img} className={`w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity ${!isMasonry?'aspect-video':''}`} muted loop playsInline onMouseEnter={e=>{const p = e.target.play(); if(p!==undefined)p.catch(()=>{})}} onMouseLeave={e=>e.target.pause()}></video>
                                          )
                                      ) : (
                                          <img src={item.img} className="w-full h-full object-cover" />
                                      )}

                                      {isVideoMode && (!parsedVid.isIframe || item.img) && (
                                          <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                              <div className="w-12 h-12 rounded-full border border-white/50 group-hover:bg-white group-hover:border-white flex items-center justify-center backdrop-blur-sm transition-all"><i className="ri-play-fill text-white group-hover:text-black ml-1 text-xl transition-colors"></i></div>
                                          </div>
                                      )}
                                      {isEditing && !item.isAggregated && isVideoMode && <input className="absolute inset-x-0 top-0 text-[10px] p-1 bg-white/90 z-10 w-full" placeholder="输入 MP4 或 B站链接/BV号" value={item.vid} onChange={e=>handleArrayEdit(arrayName,item.id,'vid',e.target.value)} onClick={e=>e.stopPropagation()}/>}
                                  </div>

                                  <div className={`${isMasonry ? 'p-5' : ''} flex-1 flex flex-col items-start w-full`}>
                                      {item.category && <EditableArrayText item={item} data={data} lang={currentLang} isEditing={isEditing && !item.isAggregated} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={arrayName} field="category" tag="p" className="text-[10px] text-gray-400 mb-2 uppercase tracking-widest" />}
                                      <EditableArrayText item={item} data={data} lang={currentLang} isEditing={isEditing && !item.isAggregated} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={arrayName} field="title" tag="h3" className="font-serif text-[#313131] text-lg mb-2 leading-snug w-full group-hover:text-blue-500 transition-colors" />
                                      {item.desc !== undefined && <EditableArrayText item={item} data={data} lang={currentLang} isEditing={isEditing && !item.isAggregated} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={arrayName} field="desc" tag="p" className={`text-xs text-aman-muted leading-relaxed text-justify w-full ${!isMasonry?'line-clamp-3':''}`} />}
                                      {item.date && <p className="text-xs text-gray-500 mt-2">{item.date}</p>}
                                      {isEditing && !isVideoMode && !isMasonry && !item.isAggregated && <button onClick={(e)=>{e.stopPropagation(); openDetail(arrayName, item.id);}} className="mt-4 text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded w-full">编辑详情页深度内容</button>}
                                      {isEditing && !isVideoMode && !isMasonry && item.isAggregated && <button onClick={(e)=>{e.stopPropagation(); openDetail(item.sourceType, item.sourceId);}} className="mt-4 text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded w-full"><i className="ri-share-forward-line"></i> 前往原模块编辑</button>}
                                  </div>
                              </div>
                              );
                          })}
                      </div>
                  </div>
              );
          };

          const renderProcess = (menuId, title) => {
              const tabs = data.processTabs || [];
              const list = data[activeProcessTab] || [];
              const displayTitle = currentLang === 'en' ? (data.menus?.find(m=>m.id==='process')?.labelEn || title) : title;

              const handleAddProcessTab = () => {
                  const newId = 'process_' + Date.now();
                  setData(p => ({
                      ...p,
                      processTabs: [...(p.processTabs||[]), { id: newId, label: '新分类', labelEn: 'New Category' }],
                      [newId]: []
                  }));
                  setActiveProcessTab(newId);
              };

              const handleEditProcessTab = (id, field, val) => {
                  setData(p => ({
                      ...p,
                      processTabs: p.processTabs.map(t => t.id === id ? { ...t, [field]: val } : t)
                  }));
              };

              const handleRemoveProcessTab = (id) => {
                  setDialog({
                      type: 'confirm',
                      msg: '确定删除此分类及其所有流程节点吗？',
                      onConfirm: () => {
                          setData(p => {
                              let newData = { ...p };
                              newData.processTabs = newData.processTabs.filter(t => t.id !== id);
                              delete newData[id];
                              return newData;
                          });
                          if (activeProcessTab === id) setActiveProcessTab(tabs[0]?.id || '');
                          setDialog(null);
                      }
                  });
              };

              return (
                  <section className="animate-fade-in py-16 px-4 max-w-[1200px] mx-auto text-center min-h-screen">
                      <div className="flex justify-center items-center gap-4 mb-10">
                          <h1 className="text-3xl font-serif tracking-widest text-[#313131]">{displayTitle}</h1>
                      </div>

                      {/* 聚合分类 Tabs */}
                      <div className="flex justify-center items-center mb-12 overflow-x-auto hide-scrollbar w-full px-2">
                          <div className="flex items-center bg-gray-50/50 p-1.5 rounded-full border border-gray-200 shadow-sm min-w-max">
                              {tabs.map(tab => (
                                  <div key={tab.id} className="relative group flex items-center shrink-0">
                                      {isEditing ? (
                                          <input
                                              className={`px-6 py-2 text-sm text-center outline-none bg-transparent rounded-full transition-all ${activeProcessTab === tab.id ? 'bg-white shadow font-bold text-black' : 'text-gray-500 hover:text-black'}`}
                                              value={currentLang === 'en' ? (tab.labelEn || tab.label) : tab.label}
                                              onClick={() => setActiveProcessTab(tab.id)}
                                              onChange={e => handleEditProcessTab(tab.id, currentLang === 'en' ? 'labelEn' : 'label', e.target.value)}
                                              onBlur={e => {
                                                  if (currentLang === 'cn' && window.__autoTranslateEnabled) {
                                                      autoTranslateField(e.target.value, (translated) => handleEditProcessTab(tab.id, 'labelEn', translated));
                                                  }
                                              }}
                                              style={{ width: '130px' }}
                                          />
                                      ) : (
                                          <button
                                              onClick={() => setActiveProcessTab(tab.id)}
                                              className={`px-6 py-2 text-sm whitespace-nowrap transition-all rounded-full ${activeProcessTab === tab.id ? 'bg-white shadow font-bold text-black' : 'text-gray-500 hover:text-black'}`}
                                          >
                                              {currentLang === 'en' ? (tab.labelEn || tab.label) : tab.label}
                                          </button>
                                      )}
                                      {isEditing && (
                                          <button onClick={(e)=>{e.stopPropagation(); handleRemoveProcessTab(tab.id)}} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] opacity-0 group-hover:opacity-100 shadow"><i className="ri-close-line"></i></button>
                                      )}
                                  </div>
                              ))}
                              {isEditing && (
                                  <button onClick={handleAddProcessTab} className="px-4 py-2 text-xs text-blue-600 font-bold hover:bg-blue-50 rounded-full transition-colors whitespace-nowrap ml-1">
                                      + 添加分类
                                  </button>
                              )}
                          </div>
                      </div>
                      
                      <div className="mb-28 text-left mt-6">
                          {isEditing && activeProcessTab && (
                              <div className="text-center mb-8">
                                  <button onClick={()=>handleAddArrayItem(activeProcessTab, {title:'新节点', desc:'描述', img:''})} className="text-xs bg-blue-100 text-blue-600 px-5 py-2.5 rounded-full shadow-sm hover:bg-blue-200 transition-colors">
                                      <i className="ri-add-line mr-1"></i> 在【{tabs.find(t=>t.id===activeProcessTab)?.label}】下新增节点
                                  </button>
                              </div>
                          )}
                          <div className="flex flex-wrap justify-center gap-6">
                              {list.length === 0 ? (
                                  <div className="text-gray-400 text-sm tracking-widest py-10 w-full text-center">暂无流程节点内容</div>
                              ) : (
                                  list.map((step, idx) => (
                                      <div key={step.id} 
                                           draggable={isEditing}
                                           onDragStart={(e) => handleDragStart(e, step.id, activeProcessTab)}
                                           onDragEnter={(e) => handleDragEnter(e, step.id, activeProcessTab)}
                                           onDragOver={(e) => e.preventDefault()}
                                           onDragEnd={handleDragEnd}
                                           className="relative flex-1 min-w-[200px] max-w-[250px] group flex flex-col transition-transform duration-300">
                                          
                                          {isEditing && <div className="absolute top-2 left-2 bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center z-30 cursor-grab" title="拖拽排序节点"><i className="ri-drag-move-2-fill"></i></div>}
                                          {isEditing && <button onClick={()=>handleRemoveArrayItem(activeProcessTab, step.id)} className="absolute top-2 right-2 bg-red-500 text-white w-5 h-5 flex items-center justify-center rounded z-30"><i className="ri-delete-bin-line text-xs"></i></button>}
                                          
                                          <div className="aspect-video bg-gray-100 mb-4 rounded-sm overflow-hidden relative">
                                              {isEditing && <input className="absolute inset-x-0 bottom-0 text-[10px] p-1 bg-white/90 z-10 w-full" placeholder="图片URL" value={step.img} onChange={e=>handleArrayEdit(activeProcessTab,step.id,'img',e.target.value)}/>}
                                              <img src={step.img} className="w-full h-full object-cover" />
                                          </div>
                                          <EditableArrayText item={step} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={activeProcessTab} field="title" tag="h4" className="font-bold text-sm mb-2 text-[#313131] w-full" />
                                          <EditableArrayText item={step} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={activeProcessTab} field="desc" tag="p" className="text-xs text-gray-500 w-full" />
                                          
                                          {idx < list.length - 1 && (
                                              <div className="hidden md:flex absolute top-[30%] -right-5 transform -translate-y-1/2 z-0 w-6 items-center justify-center">
                                                  <i className="ri-arrow-right-line text-2xl text-gray-300"></i>
                                              </div>
                                          )}
                                      </div>
                                  ))
                              )}
                          </div>
                      </div>
                  </section>
              );
          };

          const renderDetail = () => {
              if (!activeDetail) return null;
              const { type, id } = activeDetail;
              const item = data[type]?.find(i => i.id === id);
              if (!item) return null;

              return (
                  <article className="animate-fade-in max-w-5xl mx-auto px-4 py-10 min-h-screen">
                      <button onClick={()=>setCurrentRoute(type)} className="mb-10 text-aman-muted hover:text-black flex items-center gap-1 text-sm"><i className="ri-arrow-left-line"></i> {currentLang === 'en' ? data.uiTexts?.backBtnEn || 'Back' : data.uiTexts?.backBtn || '返回'}</button>
                      <div className="text-center mb-12 border-b border-aman-border/30 pb-10">
                          <p className="text-xs text-gray-400 mb-4 tracking-widest">{currentLang === 'en' ? item.categoryEn || item.category : item.category}</p>
                          <EditableArrayText item={item} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={type} field="title" tag="h1" className="text-4xl font-serif text-[#313131] mb-8 leading-tight w-full" />
                          <EditableArrayText item={item} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName={type} field="desc" tag="p" className="text-sm text-aman-muted leading-relaxed max-w-3xl mx-auto text-justify md:text-center" />
                      </div>

                      <div className="mooool-content flex flex-wrap w-full gap-8">
                          {(item.media || []).map((m, idx) => {
                              const panoMode = m.panoMode || (m.isIframe === false ? 'link' : 'iframe');

                              return (
                              <div key={m.id} 
                                   draggable={isEditing}
                                   onDragStart={(e) => handleDragStartMedia(e, type, item.id, m.id)}
                                   onDragEnter={(e) => handleDragEnterMedia(e, type, item.id, m.id)}
                                   onDragOver={(e) => e.preventDefault()}
                                   onDragEnd={handleDragEndMedia}
                                   className={`relative group transition-all duration-300 ${getMediaWidthClass(m.cardSize)} ${isEditing ? 'border border-dashed border-gray-300 p-2 pt-10 rounded bg-gray-50/30' : ''}`}>
                                  
                                  {isEditing && (
                                      <div className="absolute top-2 left-2 flex gap-1 z-50">
                                          <div className="bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center cursor-grab" title="拖拽排序区块"><i className="ri-drag-move-2-fill"></i></div>
                                          <button onClick={(e) => {e.stopPropagation(); handleUpdateMedia(type, item.id, m.id, 'cardSize', 'small')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${m.cardSize==='small'?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>S</button>
                                          <button onClick={(e) => {e.stopPropagation(); handleUpdateMedia(type, item.id, m.id, 'cardSize', 'medium')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${m.cardSize==='medium'?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>M</button>
                                          <button onClick={(e) => {e.stopPropagation(); handleUpdateMedia(type, item.id, m.id, 'cardSize', 'large')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${m.cardSize==='large'||!m.cardSize?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>L</button>
                                          <button onClick={(e) => {e.stopPropagation(); handleRemoveMedia(type, item.id, m.id)}} className="w-5 h-5 text-[9px] bg-red-500 text-white rounded flex items-center justify-center shadow hover:bg-red-600 ml-1"><i className="ri-delete-bin-line text-xs"></i></button>
                                      </div>
                                  )}
                                  
                                  {m.type === 'text' && (
                                      isEditing ? 
                                      <textarea className="w-full p-4 border rounded min-h-[150px] outline-none focus:border-blue-500 bg-white" value={m.content} onChange={e=>handleUpdateMedia(type, item.id, m.id, 'content', e.target.value)} placeholder="输入段落正文..." onClick={e=>e.stopPropagation()} />
                                      : <p className="!mb-0 h-full">{m.content}</p>
                                  )}
                                  
                                  {m.type === 'image' && (
                                      <div className="relative w-full h-full flex flex-col">
                                          {isEditing && <input className="absolute top-2 left-2 z-10 w-3/4 p-2 text-xs rounded shadow border" placeholder="图片 URL" value={m.url} onChange={e=>handleUpdateMedia(type, item.id, m.id, 'url', e.target.value)} onClick={e=>e.stopPropagation()} />}
                                          {m.url ? <img src={m.url} className={`rounded-sm w-full ${m.cardSize !== 'large' && m.cardSize ? 'h-full object-cover flex-1' : ''} !mt-0 !mb-0`} /> : <div className="w-full h-40 bg-gray-100 flex items-center justify-center text-gray-400 border border-dashed border-gray-300 rounded">填入图片地址以展示</div>}
                                          {isEditing ? <input className="w-full p-1 text-xs text-center border-b outline-none text-gray-500 bg-transparent mt-2" placeholder="图片说明 (Caption)" value={m.caption} onChange={e=>handleUpdateMedia(type,item.id,m.id,'caption',e.target.value)} onClick={e=>e.stopPropagation()} />
                                          : (m.caption && <p className="img-caption !mb-0 !mt-2">{m.caption}</p>)}
                                      </div>
                                  )}

                                  {m.type === 'video' && (() => {
                                      const parsedVid = parseVideoUrl(m.url);
                                      return (
                                      <div className={`relative aspect-video bg-black rounded overflow-hidden shadow-inner border border-gray-200 w-full h-full !mt-0 !mb-0`}>
                                          {isEditing && <input className="absolute top-2 left-2 z-10 w-3/4 p-2 text-xs rounded shadow border" placeholder="MP4 URL 或 B站链接/BV号" value={m.url} onChange={e=>handleUpdateMedia(type, item.id, m.id, 'url', e.target.value)} onClick={e=>e.stopPropagation()} />}
                                          {parsedVid.isIframe ? (
                                              <iframe src={parsedVid.url} className="w-full h-full border-0 absolute inset-0 z-0" allow="autoplay; fullscreen" allowFullScreen></iframe>
                                          ) : m.url ? (
                                              <video src={parsedVid.url} controls playsInline className="w-full h-full object-cover relative z-0"></video>
                                          ) : (
                                              <div className="w-full h-full flex items-center justify-center text-gray-400 relative z-0">填入视频地址以展示</div>
                                          )}
                                          {isEditing ? <input className="w-full p-1 text-xs text-center border-b outline-none text-gray-500 bg-white/80 backdrop-blur absolute bottom-2 z-10" placeholder="视频说明 (Caption)" value={m.caption} onChange={e=>handleUpdateMedia(type,item.id,m.id,'caption',e.target.value)} onClick={e=>e.stopPropagation()} />
                                          : (m.caption && <p className="img-caption !mb-2 !mt-0 absolute bottom-0 inset-x-0 z-10 bg-gradient-to-t from-black/60 pt-4 pb-2 text-white">{m.caption}</p>)}
                                      </div>
                                      );
                                  })()}

                                  {/* 全新重构的多模式全景模块 (原生图片360 / 外链 iframe / 跳转防屏蔽) */}
                                  {m.type === 'panorama' && (
                                      <div className={`relative aspect-video md:aspect-[2/1] w-full h-full bg-gray-100 rounded overflow-hidden shadow-inner border border-gray-200 group !mt-0 !mb-0`}>
                                          {isEditing && (
                                              <div className="absolute top-2 left-2 right-2 z-40 flex flex-col gap-2 p-3 bg-white/95 backdrop-blur-md rounded-lg shadow-lg border border-gray-200">
                                                  <div className="flex gap-2 items-center">
                                                      <span className="text-xs font-bold text-gray-700 whitespace-nowrap w-16">渲染模式:</span>
                                                      <select 
                                                          className="flex-1 p-1.5 text-xs rounded border outline-none focus:border-blue-500 font-bold text-blue-700 bg-blue-50"
                                                          value={panoMode} 
                                                          onChange={e=>handleUpdateMedia(type, item.id, m.id, 'panoMode', e.target.value)}
                                                      >
                                                          <option value="image360">🌟 纯图片原生 360°VR漫游引擎 (推荐)</option>
                                                          <option value="iframe">🔗 第三方平台内嵌 (Iframe 支持建E/酷家乐等)</option>
                                                          <option value="link">🛡️ 静态封面 + 点击跳新窗口防拦截</option>
                                                      </select>
                                                  </div>
                                                  {panoMode !== 'image360' && (
                                                      <div className="flex gap-2 items-center">
                                                          <span className="text-xs font-bold text-gray-700 whitespace-nowrap w-16">外链URL:</span>
                                                          <input className="flex-1 p-1.5 text-xs rounded border outline-none focus:border-blue-500" placeholder="第三方全景 URL (如建E网)" value={m.url||''} onChange={e=>handleUpdateMedia(type, item.id, m.id, 'url', e.target.value)} onClick={e=>e.stopPropagation()} />
                                                      </div>
                                                  )}
                                                  {panoMode !== 'iframe' && (
                                                      <div className="flex gap-2 items-center">
                                                          <span className="text-xs font-bold text-gray-700 whitespace-nowrap w-16">图片URL:</span>
                                                          <input className="flex-1 p-1.5 text-xs rounded border outline-none focus:border-blue-500" placeholder={panoMode === 'image360' ? "输入全景相机直出的 2:1 比例等距圆柱投影图片URL" : "输入静态封面图URL"} value={m.imgUrl||''} onChange={e=>handleUpdateMedia(type, item.id, m.id, 'imgUrl', e.target.value)} onClick={e=>e.stopPropagation()} />
                                                      </div>
                                                  )}
                                              </div>
                                          )}
                                          
                                          {panoMode === 'iframe' && m.url && (
                                              <iframe src={m.url} className="w-full h-full border-0 absolute inset-0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; xr-spatial-tracking" allowFullScreen></iframe>
                                          )}

                                          {panoMode === 'image360' && (
                                              <div className="w-full h-full absolute inset-0">
                                                  {m.imgUrl ? <Image360Viewer image={m.imgUrl} /> : <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 border border-dashed border-gray-300 pb-6 bg-gray-50"><i className="ri-360-view text-3xl mb-2"></i><span>填入 2:1 全景大图 URL 以激活原生 360° 渲染</span></div>}
                                              </div>
                                          )}

                                          {panoMode === 'link' && (
                                              <div className="w-full h-full relative cursor-pointer overflow-hidden" onClick={() => { if(m.url && !isEditing) window.open(m.url, '_blank') }}>
                                                  {m.imgUrl ? (
                                                      <img src={m.imgUrl} className={`w-full h-full object-cover ${!m.url ? 'animate-pan hover:[animation-play-state:paused]' : 'group-hover:scale-105 transition-transform duration-700'}`} />
                                                  ) : (
                                                      <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 border border-dashed border-gray-300 pb-6 bg-gray-50">
                                                          <i className="ri-image-add-line text-3xl mb-2"></i>
                                                          <span>填入封面图 URL 或 外链以展示</span>
                                                      </div>
                                                  )}
                                                  {m.url && (
                                                      <div className="absolute inset-0 flex items-center justify-center bg-black/30 group-hover:bg-black/50 transition-colors">
                                                          <div className="bg-white/95 text-[#313131] px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 transform group-hover:scale-105 transition-all">

                                                      {(c.link||'').startsWith('tel:') ? <div className="w-full h-full flex flex-col items-center justify-center border border-dashed text-[10px] text-gray-500 bg-white"><i className="ri-phone-line mb-1"></i>{currentLang==='en'?'Call':'直拨热线'}</div> : (c.qr ? <img src={c.qr} className="w-full h-full object-cover" /> : <div className="w-full h-full flex flex-col items-center justify-center border border-dashed text-[10px] text-gray-500 bg-white"><i className="ri-qr-code-line mb-1"></i>{currentLang==='en'?'QR Code':'二维码'}</div>)}
