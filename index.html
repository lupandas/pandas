        const PARSED_DATA = IS_ENCRYPTED ? JSON.parse(decodeURIComponent(atob(RAW_DATA))) : RAW_DATA;

        // --- 免费机器翻译引擎 ---
        const translateToEn = async (text) => {
            if (!text || !text.trim()) return text;
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                return data[0].map(item => item[0]).join('');
            } catch (err) {
                console.error("Translation failed:", err);
                return text;
            }
        };

        const autoTranslateField = async (value, onEditCallback) => {
            if (!window.__autoTranslateEnabled || window.__currentLang !== 'cn' || !value) return;
            if (window.__showToast) window.__showToast("🔄 机器翻译同步中...");
            const translated = await translateToEn(value);
            onEditCallback(translated);
            if (window.__showToast) {
                window.__showToast("✅ 英文版已同步");
                setTimeout(() => window.__showToast(''), 2000);
            }
        };

        const ParticlesBackground = ({ color }) => {
          const canvasRef = useRef(null);
          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let particles = [];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            
            class Particle {
              constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
              }
              update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.005;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
              }
              draw() {
                ctx.fillStyle = color || 'rgba(0,0,0,0.1)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
              }
            }
            for(let i=0; i<80; i++) particles.push(new Particle());
            
            const animate = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              particles.forEach(p => { p.update(); p.draw(); });
              animationFrameId = requestAnimationFrame(animate);
            };
            animate();
            return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
          }, [color]);
          return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[-1] opacity-60"></canvas>;
        };

        // --- 纯图片 360° VR 全景渲染引擎封装 ---
        const Image360Viewer = ({ image }) => {
            const containerRef = useRef(null);
            const viewerRef = useRef(null);

            useEffect(() => {
                if (window.pannellum && image && containerRef.current) {
                    if (viewerRef.current) {
                        try { viewerRef.current.destroy(); } catch (e) {}
                    }
                    try {
                        viewerRef.current = window.pannellum.viewer(containerRef.current, {
                            type: 'equirectangular',
                            panorama: image,
                            autoLoad: true,
                            showControls: true,
                            mouseZoom: true,
                            keyboardZoom: false
                        });
                    } catch (e) {
                        console.error("Pannellum Init Error", e);
                    }
                }
                return () => {
                    if (viewerRef.current) {
                        try { viewerRef.current.destroy(); } catch (e) {}
                    }
                };
            }, [image]);

            return <div ref={containerRef} className="w-full h-full cursor-grab active:cursor-grabbing"></div>;
        };

        const getMergedStyles = (data, fieldKey) => {
          const cStyle = data.customStyles?.[fieldKey] || {};
          const isGrad = cStyle.isGradient;
          return {
            fontSize: cStyle.fontSize || undefined,
            fontFamily: cStyle.fontFamily || undefined,
            ...(isGrad
              ? { backgroundImage: cStyle.color || 'linear-gradient(to right, #bf953f, #fcf6ba)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', color: 'transparent' }
              : { color: cStyle.color || undefined, WebkitTextFillColor: 'initial', backgroundImage: 'none' })
          };
        };

        // --- 主页内嵌视频控制器组件 ---
        const HeroVideoPlayer = ({ src, objectFit, loop, onEnded }) => {
            const videoRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(true);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                if (videoRef.current) {
                    if (src) {
                        videoRef.current.play().then(() => setIsPlaying(true)).catch(() => setIsPlaying(false));
                    } else {
                        setIsPlaying(false);
                    }
                }
            }, [src]);

            const handleTimeUpdate = () => {
                if (videoRef.current) {
                    const p = (videoRef.current.currentTime / videoRef.current.duration) * 100;
                    setProgress(p || 0);
                }
            };

            const togglePlay = (e) => {
                e.stopPropagation();
                if (videoRef.current) {
                    if (videoRef.current.paused) {
                        const playPromise = videoRef.current.play();
                        if (playPromise !== undefined) {
                            playPromise.then(() => setIsPlaying(true)).catch(() => setIsPlaying(false));
                        }
                    } else {
                        videoRef.current.pause();
                        setIsPlaying(false);
                    }
                }
            };

            const stopVideo = (e) => {
                e.stopPropagation();
                if (videoRef.current) {
                    videoRef.current.pause();
                    videoRef.current.currentTime = 0;
                    setIsPlaying(false);
                }
            };

            const toggleFullscreen = (e) => {
                e.stopPropagation();
                if (videoRef.current) {
                    if (videoRef.current.requestFullscreen) {
                        videoRef.current.requestFullscreen();
                    } else if (videoRef.current.webkitRequestFullscreen) {
                        videoRef.current.webkitRequestFullscreen();
                    }
                }
            };

            const handleSeek = (e) => {
                e.stopPropagation();
                const val = e.target.value;
                if (videoRef.current && videoRef.current.duration) {
                    videoRef.current.currentTime = (val / 100) * videoRef.current.duration;
                    setProgress(val);
                }
            };

            return (
                <div className="relative w-full h-full group bg-black">
                    <video 
                        ref={videoRef} 
                        src={src} 
                        className={`w-full h-full object-${objectFit} transition-opacity duration-1000`} 
                        autoPlay muted playsInline loop={loop} 
                        onEnded={onEnded}
                        onTimeUpdate={handleTimeUpdate}
                        onClick={togglePlay}
                    ></video>
                    
                    {/* Hover 控制器遮罩 */}
                    <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent pt-12 pb-4 px-6 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none flex flex-col justify-end z-20">
                        <div className="flex items-center gap-4 w-full max-w-5xl mx-auto pointer-events-auto">
                            <button onClick={togglePlay} className="text-white hover:text-blue-400 transition" title={isPlaying ? "暂停" : "播放"}>
                                <i className={isPlaying ? "ri-pause-fill text-2xl" : "ri-play-fill text-2xl"}></i>

                                type="range" min="0" max="100" value={progress} onChange={handleSeek}

                                           [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-white

        };

        const EditableText = ({ data, field, lang = 'cn', tag: Tag = 'div', className, isEditing, onEdit, onFocus, isUiText = false }) => {
          const actualField = (lang === 'en' && !['langCn','langEn','footerIcp'].includes(field)) ? (field + 'En') : field;
          const mergedStyle = getMergedStyles(data, actualField);
          const cStyle = data.customStyles?.[actualField] || {};
          
          let value = isUiText ? data.uiTexts?.[actualField] : (data.home?.[actualField] ?? data.about?.[actualField] ?? data.contactData?.[actualField] ?? data[actualField]);
          
          if (lang === 'en' && !value) {
             value = isUiText ? data.uiTexts?.[field] : (data.home?.[field] ?? data.about?.[field] ?? data.contactData?.[field] ?? data[field]);
          }
          
          if (isEditing) {
            return (
              <div className="relative inline-block w-full">
                {cStyle.iconUrl && <img src={cStyle.iconUrl} alt="icon" style={{width: cStyle.iconSize || '24px', height: cStyle.iconSize || '24px', display: 'inline-block', verticalAlign: 'middle', marginRight: '6px', marginTop: '-4px'}} />}
                <textarea 
                  className={`w-full bg-black/5 border border-black/20 rounded p-1 outline-none resize-none focus:ring-1 ring-blue-500 text-center ${className} ${cStyle.isGradient ? '' : 'text-[#313131]'}`}
                  style={mergedStyle} value={isUiText ? (data.uiTexts?.[actualField]||'') : (data.home?.[actualField] ?? data.about?.[actualField] ?? data.contactData?.[actualField] ?? data[actualField] ?? '')} 
                  onChange={(e) => onEdit(actualField, e.target.value, isUiText)}
                  onBlur={(e) => {
                      if (window.__autoTranslateEnabled && lang === 'cn' && !actualField.endsWith('En')) {
                          autoTranslateField(e.target.value, (translated) => onEdit(actualField + 'En', translated, isUiText));
                      }
                  }}
                  onFocus={(e) => { e.stopPropagation(); onFocus({ key: actualField, label: actualField }); }}
                  rows={Tag === 'h1' || Tag === 'span' || Tag === 'h2' || Tag === 'h3' ? 1 : 3}
                  onClick={e=>e.stopPropagation()}
                />
              </div>
            );
          }
          return (
            <Tag className={`${className} transition-colors duration-300 whitespace-pre-line`} style={mergedStyle}>
                {cStyle.iconUrl && <img src={cStyle.iconUrl} alt="icon" style={{width: cStyle.iconSize || '24px', height: cStyle.iconSize || '24px', display: 'inline-block', verticalAlign: 'middle', marginRight: '6px', marginTop: '-4px'}} />}
                {value}
            </Tag>
          );
        };

        const EditableArrayText = ({ item, data, field, lang = 'cn', arrayName, tag: Tag = 'div', className, isEditing, onEdit, onFocus }) => {
          const actualField = (lang === 'en' && !['date','id','icon','link','qr'].includes(field)) ? (field + 'En') : field;
          const fieldKey = `${arrayName}_${item.id}_${actualField}`;
          const mergedStyle = getMergedStyles(data, fieldKey);
          const cStyle = data.customStyles?.[fieldKey] || {};
          
          let value = item[actualField];
          if (lang === 'en' && !value) value = item[field];

          if (isEditing) {
            return (
              <div className="relative inline-block w-full">
                {cStyle.iconUrl && <img src={cStyle.iconUrl} alt="icon" style={{width: cStyle.iconSize || '24px', height: cStyle.iconSize || '24px', display: 'inline-block', verticalAlign: 'middle', marginRight: '6px', marginTop: '-4px'}} />}
                <textarea 
                  className={`w-full bg-black/5 border border-black/20 rounded p-1 outline-none resize-none focus:ring-1 ring-blue-500 text-center ${className}`}
                  style={mergedStyle} value={item[actualField] || ''} onChange={(e) => onEdit(arrayName, item.id, actualField, e.target.value)}
                  onBlur={(e) => {
                      if (window.__autoTranslateEnabled && lang === 'cn' && !actualField.endsWith('En') && !['date','id','icon','link','qr'].includes(actualField)) {
                          autoTranslateField(e.target.value, (translated) => onEdit(arrayName, item.id, actualField + 'En', translated));
                      }
                  }}
                  onFocus={(e) => { e.stopPropagation(); onFocus({ key: fieldKey, label: actualField }); }}
                  rows={Tag === 'h3' || Tag === 'h4' || Tag === 'span' ? 1 : 3}
                  onClick={e=>e.stopPropagation()}
                />
              </div>
            );
          }
          return (
            <Tag className={`${className} transition-colors duration-300 whitespace-pre-line`} style={mergedStyle}>
                {cStyle.iconUrl && <img src={cStyle.iconUrl} alt="icon" style={{width: cStyle.iconSize || '24px', height: cStyle.iconSize || '24px', display: 'inline-block', verticalAlign: 'middle', marginRight: '6px', marginTop: '-4px'}} />}
                {value}
            </Tag>
          );
        };

        const PLATFORM_PRESETS = [
            { icon: 'ri-wechat-fill', label: '微信', labelEn: 'WeChat', value: '扫码添加', link: '#', qr: '' },
            { icon: 'ri-book-read-fill', label: '小红书', labelEn: 'Xiaohongshu', value: '@账号', link: 'https://xiaohongshu.com/', qr: '' },
            { icon: 'ri-tiktok-fill', label: '抖音', labelEn: 'Douyin', value: '@账号', link: 'https://douyin.com/', qr: '' },
            { icon: 'ri-bilibili-fill', label: 'b站', labelEn: 'Bilibili', value: '@账号', link: 'https://bilibili.com/', qr: '' },
            { icon: 'ri-zcool-fill', label: '站酷', labelEn: 'Zcool', value: '@账号', link: 'https://zcool.com.cn/', qr: '' },
            { icon: 'ri-pinterest-fill', label: 'Pinterest', labelEn: 'Pinterest', value: '@账号', link: 'https://pinterest.com/', qr: '' },
            { icon: 'ri-phone-fill', label: '电话', labelEn: 'Phone', value: '联系号码', link: 'tel:', qr: '' },
            { icon: 'ri-wechat-line', label: '微信公众号', labelEn: 'Official Account', value: '搜索公众号', link: '#', qr: '' },
            { icon: 'ri-mini-program-fill', label: '微信小程序', labelEn: 'Mini Program', value: '扫码进入', link: '#', qr: '' },
            { icon: 'ri-video-line', label: '微信视频号', labelEn: 'WeChat Video', value: '扫码观看', link: '#', qr: '' },
            { icon: 'ri-global-line', label: '自定义网址', labelEn: 'Website', value: '点击访问', link: 'https://', qr: '' }
        ];

        function App() {
          const [data, setData] = useState(PARSED_DATA);
          const [isEditing, setIsEditing] = useState(false); 
          const [currentRoute, setCurrentRoute] = useState('home'); 
          const [currentLang, setCurrentLang] = useState('cn'); 
          const [activeDetail, setActiveDetail] = useState(null); 
          const [focusedField, setFocusedField] = useState(null); 
          
          // --- 全局过滤状态映射 ---
          const [activeFilters, setActiveFilters] = useState({});

          const [isSearchOpen, setIsSearchOpen] = useState(false);
          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState([]);
          const [playingVideo, setPlayingVideo] = useState(null);
          const [lightboxImg, setLightboxImg] = useState(null);

          const [activeProcessTab, setActiveProcessTab] = useState('process_courtyard');

          const [bgEditTarget, setBgEditTarget] = useState('home');
          const [currentSlide, setCurrentSlide] = useState(0);
          const [currentVideoIndex, setCurrentVideoIndex] = useState(0);

          const [showAddMenuModal, setShowAddMenuModal] = useState(false);
          const [newMenuTemp, setNewMenuTemp] = useState({ label: '新页面', labelEn: 'New Page', template: 'case' });
          const [showAddPlatformModal, setShowAddPlatformModal] = useState(false);

          const [showAuthModal, setShowAuthModal] = useState(false);
          const [authPwd, setAuthPwd] = useState('');
          const [dialog, setDialog] = useState(null); 

          const [autoTranslate, setAutoTranslate] = useState(true);
          const [toastMsg, setToastMsg] = useState('');

          const clickCount = useRef(0);
          const clickTimer = useRef(null);

          useEffect(() => {
              window.__autoTranslateEnabled = autoTranslate;
              window.__currentLang = currentLang;
              window.__showToast = setToastMsg;
          }, [autoTranslate, currentLang]);

          useEffect(() => {
              if (data.processTabs && data.processTabs.length > 0 && !data.processTabs.find(t => t.id === activeProcessTab)) {
                  setActiveProcessTab(data.processTabs[0].id);
              }
          }, [data.processTabs]);

          useEffect(() => {
              if (data.hero?.type === 'slider' && data.hero?.slides?.length > 1) {
                  const timer = setInterval(() => {
                      setCurrentSlide(s => (s + 1) % data.hero.slides.length);
                  }, 4000);
                  return () => clearInterval(timer);
              }
          }, [data.hero]);

          useEffect(() => {
              if (currentRoute === 'detail' && activeDetail) {
                  setBgEditTarget(activeDetail.type);
              } else if (currentRoute !== 'search') {
                  setBgEditTarget(currentRoute);
              }
              
              const bg = data.backgrounds[currentRoute] || { type: 'color', color: '#f3eee7' };
              if (bg.type === 'color') {
                  document.body.style.backgroundColor = bg.color;
                  document.body.style.backgroundImage = 'none';
              } else if (bg.type === 'gradient') {
                  document.body.style.backgroundImage = bg.color;
                  document.body.style.backgroundColor = 'transparent';
              } else if (bg.type === 'image') {
                  document.body.style.backgroundImage = `url(${bg.imageUrl})`;
                  document.body.style.backgroundSize = 'cover';
                  document.body.style.backgroundPosition = 'center';
                  document.body.style.backgroundAttachment = 'fixed';
              }
          }, [currentRoute, activeDetail, data.backgrounds]);

          const navigateTo = (route) => {
              setCurrentRoute(route);
              setActiveDetail(null);
              window.scrollTo(0,0);
              setIsSearchOpen(false);
              setIsMobileMenuOpen(false); 
          };

          const openDetail = (type, id) => {
              setActiveDetail({ type, id });
              setCurrentRoute('detail');
              window.scrollTo(0,0);
          };

          const handleMenuClick = (e) => {
            if(e) e.stopPropagation();
            if(isEditing) { setIsEditing(false); return; }
            
            clickCount.current += 1;
            if(false /* backend disabled */) { 
                setShowAuthModal(true); 
                clickCount.current = 0; 
            }
            clearTimeout(clickTimer.current);
            clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 1000);
          };

          const verifyPwd = () => {
              if(authPwd === 'pandas') {
                  setIsEditing(true);
                  setShowAuthModal(false);
                  setAuthPwd('');
              } else {
                  setShowAuthModal(false);
                  setAuthPwd('');
              }
          };

          const handleEditObj = (field, value, isUiText = false) => {
              setData(p => {
                  let newData = { ...p };
                  if(isUiText && p.uiTexts) newData.uiTexts[field] = value;
                  else if (p.home && p.home[field] !== undefined) newData.home[field] = value;
                  else if (p.about && p.about[field] !== undefined) newData.about[field] = value;
                  else if (p.contactData && p.contactData[field] !== undefined) newData.contactData[field] = value;
                  else newData[field] = value;
                  return newData;
              });
          };

          const handleLogoEdit = (logoKey, field, value) => {
              setData(p => ({
                  ...p,
                  logos: {
                      ...p.logos,
                      [logoKey]: { ...p.logos[logoKey], [field]: value }
                  }
              }));
          };

          const handleBlurLogoEdit = (logoKey, field, value) => {
              if (currentLang === 'cn' && autoTranslate && !field.endsWith('En') && field !== 'imgUrl' && field !== 'type') {
                  autoTranslateField(value, (translated) => {
                      handleLogoEdit(logoKey, field + 'En', translated);
                  });
              }
          };

          const handleArrayEdit = (arrayName, id, field, value) => {
              let path = arrayName.split('.');
              setData(p => {
                  let newData = { ...p };
                  if(path.length === 2) {
                      newData[path[0]][path[1]] = newData[path[0]][path[1]].map(item => item.id === id ? { ...item, [field]: value } : item);
                  } else {
                      newData[arrayName] = (newData[arrayName]||[]).map(item => item.id === id ? { ...item, [field]: value } : item);
                  }
                  return newData;
              });
          };

          const handleAddArrayItem = (arrayName, template) => {
              let path = arrayName.split('.');
              setData(p => {
                  let newData = { ...p };
                  let newId = path[path.length-1].substring(0,2) + Date.now();
                  if(path.length === 2) {
                      newData[path[0]][path[1]] = [{ ...template, id: newId }, ...(newData[path[0]][path[1]] || [])];
                  } else {
                      newData[arrayName] = [{ ...template, id: newId }, ...(newData[arrayName] || [])];
                  }
                  return newData;
              });
          };
          
          const handleRemoveArrayItem = (arrayName, id) => {
              setDialog({
                  type: 'confirm',
                  msg: '确认删除此项内容吗？',
                  onConfirm: () => {
                      let path = arrayName.split('.');
                      setData(p => {
                          let newData = { ...p };
                          if(path.length === 2) {
                              newData[path[0]][path[1]] = newData[path[0]][path[1]].filter(item => item.id !== id);
                          } else {
                              newData[arrayName] = newData[arrayName].filter(item => item.id !== id);
                          }
                          return newData;
                      });
                      setDialog(null);
                  }
              });
          };

          // --- 拖拽排序逻辑 (DnD) ---
          const dragItemNode = useRef(null);
          const dragOverItemNode = useRef(null);

          const handleReorderById = (arrayName, dragId, dropId) => {
              if (dragId === dropId) return;
              setData(p => {
                  let path = arrayName.split('.');
                  let newData = { ...p };
                  let list;
                  if (path.length === 2) {
                      list = [...newData[path[0]][path[1]]];
                  } else {
                      list = [...newData[arrayName]];
                  }

                  const dragIndex = list.findIndex(i => i.id === dragId);
                  const dropIndex = list.findIndex(i => i.id === dropId);

                  if (dragIndex > -1 && dropIndex > -1) {
                      const [removed] = list.splice(dragIndex, 1);
                      list.splice(dropIndex, 0, removed);
                  }

                  if (path.length === 2) {
                      newData[path[0]][path[1]] = list;
                  } else {
                      newData[arrayName] = list;
                  }
                  return newData;
              });
          };

          const handleDragStart = (e, id, arrayName) => {
              if (!isEditing) return;
              dragItemNode.current = { id, arrayName };
              e.dataTransfer.effectAllowed = 'move';
              setTimeout(() => {
                  if (e.target && e.target.classList) e.target.classList.add('opacity-40', 'scale-95');
              }, 0);
          };

          const handleDragEnter = (e, id, arrayName) => {
              if (!isEditing) return;
              e.preventDefault();
              dragOverItemNode.current = { id, arrayName };
          };

          const handleDragEnd = (e) => {
              if (!isEditing) return;
              if (e.target && e.target.classList) e.target.classList.remove('opacity-40', 'scale-95');
              if (dragItemNode.current && dragOverItemNode.current && dragItemNode.current.arrayName === dragOverItemNode.current.arrayName) {
                  handleReorderById(dragItemNode.current.arrayName, dragItemNode.current.id, dragOverItemNode.current.id);
              }
              dragItemNode.current = null;
              dragOverItemNode.current = null;
          };

          // --- 详情页富文本模块专用的拖拽逻辑 (Media DnD) ---
          const dragMediaNode = useRef(null);
          const dragOverMediaNode = useRef(null);

          const handleReorderMedia = (type, parentId, dragId, dropId) => {
              if (dragId === dropId) return;
              setData(p => {
                  let newData = { ...p };
                  let parentList = [...(newData[type] || [])];
                  let parentIndex = parentList.findIndex(i => i.id === parentId);
                  if(parentIndex === -1) return p;
                  
                  let mediaList = [...(parentList[parentIndex].media || [])];
                  const dragIndex = mediaList.findIndex(i => i.id === dragId);
                  const dropIndex = mediaList.findIndex(i => i.id === dropId);
                  
                  if (dragIndex > -1 && dropIndex > -1) {
                      const [removed] = mediaList.splice(dragIndex, 1);
                      mediaList.splice(dropIndex, 0, removed);
                  }
                  
                  parentList[parentIndex] = { ...parentList[parentIndex], media: mediaList };
                  newData[type] = parentList;
                  return newData;
              });
          };

          const handleDragStartMedia = (e, type, parentId, mediaId) => {
              if (!isEditing) return;
              dragMediaNode.current = { type, parentId, mediaId };
              e.dataTransfer.effectAllowed = 'move';
              setTimeout(() => {
                  if (e.target && e.target.classList) e.target.classList.add('opacity-40', 'scale-95');
              }, 0);
          };

          const handleDragEnterMedia = (e, type, parentId, mediaId) => {
              if (!isEditing) return;
              e.preventDefault();
              dragOverMediaNode.current = { type, parentId, mediaId };
          };

          const handleDragEndMedia = (e) => {
              if (!isEditing) return;
              if (e.target && e.target.classList) e.target.classList.remove('opacity-40', 'scale-95');
              if (dragMediaNode.current && dragOverMediaNode.current && dragMediaNode.current.parentId === dragOverMediaNode.current.parentId) {
                  handleReorderMedia(dragMediaNode.current.type, dragMediaNode.current.parentId, dragMediaNode.current.mediaId, dragOverMediaNode.current.mediaId);
              }
              dragMediaNode.current = null;
              dragOverMediaNode.current = null;
          };

          // --- 响应式尺寸类名映射器 ---
          const getCardWidthClass = (size, defaultClass) => {
              if (size === 'large') return 'w-[90vw] md:w-[800px]';
              if (size === 'medium') return 'w-[85vw] md:w-[600px]';
              if (size === 'small') return 'w-[70vw] md:w-[300px]';
              return defaultClass;
          };

          const getGridSpanClass = (size) => {
              if (size === 'large') return 'col-span-1 md:col-span-2 lg:col-span-3';
              if (size === 'medium') return 'col-span-1 md:col-span-2';
              return 'col-span-1';
          };

          const getContactSpanClass = (size) => {
              if (size === 'large') return 'col-span-2 md:col-span-4 lg:col-span-4';
              if (size === 'medium') return 'col-span-2 md:col-span-2 lg:col-span-2';
              return 'col-span-1';
          };

          const getMediaWidthClass = (size) => {
              if (size === 'small') return 'w-full md:w-[calc(50%-1rem)]';
              if (size === 'medium') return 'w-full md:w-[calc(66.666%-1rem)]';
              return 'w-full';
          };

          const handleAddMedia = (arrayName, parentId, mediaType) => {
              const newBlock = { id: 'm'+Date.now(), type: mediaType, content: '', url: '', imgUrl: '', panoMode: 'image360', caption: '' };
              setData(p => ({ ...p, [arrayName]: p[arrayName].map(item => item.id === parentId ? {...item, media: [...(item.media||[]), newBlock]} : item) }));
          };
          const handleUpdateMedia = (arrayName, parentId, mediaId, field, value) => {
              setData(p => ({ ...p, [arrayName]: p[arrayName].map(item => item.id === parentId ? {...item, media: item.media.map(m => m.id === mediaId ? {...m, [field]: value} : m)} : item) }));
          };
          const handleRemoveMedia = (arrayName, parentId, mediaId) => {
              setData(p => ({ ...p, [arrayName]: p[arrayName].map(item => item.id === parentId ? {...item, media: item.media.filter(m => m.id !== mediaId)} : item) }));
          };

          const handleUpdateCustomStyle = (key, styleField, value) => {
              setData(p => ({ ...p, customStyles: { ...(p.customStyles || {}), [key]: { ...((p.customStyles || {})[key] || {}), [styleField]: value } } }));
          };
          const handleUpdateBg = (field, value) => {
              setData(p => ({ ...p, backgrounds: { ...p.backgrounds, [bgEditTarget]: { ...(p.backgrounds[bgEditTarget]||{}), [field]: value } } }));
          };

          const confirmAddMenu = () => {
              const id = 'custom_' + Date.now();
              setData(p => ({
                  ...p,
                  menus: [...(p.menus||[]), { id, label: newMenuTemp.label, labelEn: newMenuTemp.labelEn, type: 'custom', template: newMenuTemp.template }],
                  [id]: [] 
              }));
              setShowAddMenuModal(false);
              setCurrentRoute(id);
          };

          const handleBlurMenuLabel = (id, newLabel) => {
              if (currentLang === 'cn' && autoTranslate) {
                  autoTranslateField(newLabel, (translated) => {
                      setData(p => ({...p, menus: p.menus.map(m => m.id === id ? {...m, labelEn: translated} : m)}));
                  });
              }
          };

          const handleEditMenuLabel = (id, newLabel, isEn = false) => {
              const targetField = isEn ? 'labelEn' : 'label';
              setData(p => ({...p, menus: p.menus.map(m => m.id === id ? {...m, [targetField]: newLabel} : m)}));
          };

          const handleDeleteMenu = (id) => {
              setDialog({
                  type: 'confirm',
                  msg: '彻底删除此页面及其所有内容？此操作不可撤销！',
                  onConfirm: () => {
                      setData(p => {
                          let newData = {...p};
                          newData.menus = newData.menus.filter(m => m.id !== id);
                          delete newData[id];
                          return newData;
                      });
                      if(currentRoute === id) navigateTo('home');
                      setDialog(null);
                  }
              });
          };

          const handleMoveMenu = (index, direction) => {
              setData(p => {
                  let newMenus = [...(p.menus || [])];
                  if (index + direction < 0 || index + direction >= newMenus.length) return p;
                  const temp = newMenus[index];
                  newMenus[index] = newMenus[index + direction];
                  newMenus[index + direction] = temp;
                  return { ...p, menus: newMenus };
              });
          };

          const handleExportData = () => {
              const dataStr = JSON.stringify(data, null, 2);
              const blob = new Blob([dataStr], { type: "application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `pandas_data_export_${new Date().getTime()}.json`;
              document.body.appendChild(a);
              a.click();
              URL.revokeObjectURL(url);
              document.body.removeChild(a);
              if (window.__showToast) window.__showToast("✅ 数据导出成功！");
          };

          const handleImportData = (e) => {
              const file = e.target.files[0];
              if (!file) return;

                                                  merged[key] = { ...importedData[key], ...(p[key] || {}) };

                                                  <p className="text-[10px] text-blue-500 mb-2 uppercase tracking-widest">{item.dataLabel}</p>
                                                  <h3 className="font-serif text-lg text-[#313131] mb-2 group-hover:text-blue-600 transition-colors">{currentLang === 'en' ? (item.titleEn||item.title) : item.title}</h3>
                                                  {item.desc && <p className="text-xs text-gray-500 line-clamp-2 leading-relaxed text-justify">{currentLang === 'en' ? (item.descEn||item.desc) : item.desc}</p>}
                                              </div>
                                          </div>
                                      ))}
                                  </div>
                              )}
                          </div>
                      )}

                      {(() => {
                          const routeMenu = data.menus?.find(m => m.id === currentRoute);
                          if (!routeMenu) return null;
                          if (routeMenu.id === 'about') {
                              return (
                                  <div className="animate-fade-in py-16 md:py-20 px-4 max-w-5xl mx-auto min-h-screen">
                                      <div className="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-16 items-center">
                                          <div className="flex flex-col items-start w-full">
                                              <p className="text-xs uppercase tracking-widest text-aman-muted mb-4">About Us</p>
                                              <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="title" tag="h1" className="text-3xl md:text-4xl font-serif mb-8 text-[#313131] w-full" />
                                              <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="desc1" tag="p" className="text-sm text-aman-muted leading-relaxed mb-6 text-justify w-full" />
                                              <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="desc2" tag="p" className="text-sm text-aman-muted leading-relaxed text-justify w-full" />
                                          </div>
                                          <div className="aspect-[3/4] img-hover-zoom relative">
                                              {isEditing && (<input className="absolute top-2 left-2 z-10 w-3/4 p-2 text-xs rounded shadow" placeholder="配图 URL" value={data.about.image} onChange={e=>handleEditObj('image',e.target.value)} onClick={e=>e.stopPropagation()} />)}
                                              <img src={data.about.image} className="w-full h-full object-cover grayscale rounded-sm" />
                                          </div>
                                      </div>

                                      <div className="mt-24 md:mt-32 border-t border-aman-border/50 pt-16 md:pt-20">
                                          <div className="text-center mb-16 flex justify-center items-center gap-4 flex-col md:flex-row">
                                              <div>
                                                  <EditableText data={data} lang={currentLang} isUiText={true} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="teamTitle" tag="h2" className="text-2xl font-serif tracking-widest text-[#313131]" />
                                                  <p className="text-[10px] uppercase tracking-widest text-gray-400 mt-2">Our Team</p>
                                              </div>
                                              {isEditing && <button onClick={()=>handleAddArrayItem('team', {title:'新成员', category:'职务', img:'', media:[]})} className="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded md:ml-4">添加人员</button>}
                                          </div>
                                          <div className="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-12 text-center">
                                              {(data.team || []).map((member) => (
                                                  <div key={member.id} 
                                                       draggable={isEditing}
                                                       onDragStart={(e) => handleDragStart(e, member.id, 'team')}
                                                       onDragEnter={(e) => handleDragEnter(e, member.id, 'team')}
                                                       onDragOver={(e) => e.preventDefault()}
                                                       onDragEnd={handleDragEnd}
                                                       className="relative group flex flex-col items-center cursor-pointer transition-all duration-300" 
                                                       onClick={() => !isEditing && openDetail('team', member.id)}>
                                                      
                                                      {isEditing && <div className="absolute top-0 left-0 bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center z-30 cursor-grab"><i className="ri-drag-move-2-fill"></i></div>}
                                                      {isEditing && <button onClick={(e)=>{e.stopPropagation();handleRemoveArrayItem('team', member.id)}} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs z-20">✕</button>}
                                                      
                                                      <div className="w-24 h-24 md:w-32 md:h-32 mx-auto rounded-full overflow-hidden mb-4 bg-gray-200 grayscale group-hover:grayscale-0 transition-all duration-500 relative">
                                                          {isEditing && <input className="absolute inset-0 bg-black/50 text-white text-[10px] p-2 opacity-0 group-hover:opacity-100 z-10" placeholder="头像URL" value={member.img} onChange={e=>handleArrayEdit('team',member.id,'img',e.target.value)} onClick={e=>e.stopPropagation()} />}
                                                          <img src={member.img || "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400"} className="w-full h-full object-cover" />
                                                      </div>
                                                      <EditableArrayText item={member} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName="team" field="title" tag="h3" className="font-serif text-[#313131] text-lg mb-1" />
                                                      <EditableArrayText item={member} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName="team" field="category" tag="p" className="text-[10px] md:text-xs text-aman-muted" />
                                                      {isEditing && <button onClick={(e)=>{e.stopPropagation(); openDetail('team', member.id);}} className="mt-3 text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded">编辑主页</button>}
                                                  </div>
                                              ))}
                                          </div>
                                      </div>
                                  </div>
                              );
                          }
                          if (routeMenu.id === 'contact') {
                              return (
                                  <div className="animate-fade-in py-24 px-4 max-w-[1200px] mx-auto text-center min-h-screen">
                                      <p className="text-xs uppercase tracking-widest text-aman-muted mb-4">Contact Us</p>
                                      <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="title" tag="h1" className="text-3xl md:text-4xl font-logo mb-16 md:mb-20 text-[#313131]" />
                                      <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 md:gap-8 max-w-5xl mx-auto relative">
                                          {isEditing && <button onClick={()=>setShowAddPlatformModal(true)} className="absolute -top-10 right-0 text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded">新增社交平台</button>}
                                          {data.contactData.items.map(c => {
                                              const href = !isEditing && c.link && c.link !== '#' ? c.link : undefined;
                                              const isExternal = href && !href.startsWith('tel:') && !href.startsWith('mailto:');
                                              
                                              return (
                                              <div key={c.id} 
                                                   draggable={isEditing}
                                                   onDragStart={(e) => handleDragStart(e, c.id, 'contactData.items')}
                                                   onDragEnter={(e) => handleDragEnter(e, c.id, 'contactData.items')}
                                                   onDragOver={(e) => e.preventDefault()}
                                                   onDragEnd={handleDragEnd}
                                                   className={`group flex flex-col items-center relative transition-all duration-300 ${getContactSpanClass(c.cardSize)}`}>
                                                  
                                                  {isEditing && (
                                                      <div className="absolute top-0 left-0 flex gap-1 z-30">
                                                          <div className="bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center cursor-grab" title="拖拽排序"><i className="ri-drag-move-2-fill"></i></div>
                                                          <button onClick={(e) => {e.stopPropagation(); handleArrayEdit('contactData.items', c.id, 'cardSize', 'small')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${c.cardSize==='small'||!c.cardSize?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>S</button>
                                                          <button onClick={(e) => {e.stopPropagation(); handleArrayEdit('contactData.items', c.id, 'cardSize', 'medium')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${c.cardSize==='medium'?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>M</button>
                                                          <button onClick={(e) => {e.stopPropagation(); handleArrayEdit('contactData.items', c.id, 'cardSize', 'large')}} className={`w-5 h-5 text-[9px] rounded flex items-center justify-center shadow transition-colors ${c.cardSize==='large'?'bg-blue-600 text-white font-bold':'bg-white text-black'}`}>L</button>
                                                      </div>
                                                  )}

                                                  {isEditing && <button onClick={()=>handleRemoveArrayItem('contactData.items',c.id)} className="absolute top-0 right-0 bg-red-500 text-white rounded w-5 h-5 text-xs z-30">✕</button>}
                                                  
                                                  <a href={href} target={isExternal ? "_blank" : undefined} rel={isExternal ? "noopener noreferrer" : undefined} className={`w-16 h-16 rounded-2xl bg-white flex items-center justify-center p-3 shadow-sm border border-aman-border mb-4 transition-transform group-hover:-translate-y-2 relative ${href?'cursor-pointer':'cursor-default'}`}>
                                                      {isEditing && <input className="absolute inset-x-0 top-0 bg-white/90 text-[10px] p-1 text-center border-b z-20" placeholder="Icon类名" value={c.icon} onChange={e=>handleArrayEdit('contactData.items',c.id,'icon',e.target.value)} onClick={e=>e.stopPropagation()}/>}
                                                      <i className={`${c.icon} text-3xl text-aman-text blend-multiply`}></i>
                                                  </a>
                                                  
                                                  <EditableArrayText item={c} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName="contactData.items" field="label" tag="h3" className="font-serif text-[12px] md:text-sm tracking-widest mb-1 text-[#313131]" />
                                                  <EditableArrayText item={c} data={data} lang={currentLang} isEditing={isEditing} onEdit={handleArrayEdit} onFocus={setFocusedField} arrayName="contactData.items" field="value" tag="p" className="text-[10px] text-aman-muted mb-4" />
                                                  
                                                  {isEditing && <input className="w-full p-1.5 text-[10px] text-center border outline-none text-blue-500 mb-2 rounded bg-gray-50" placeholder="点击跳转的外链 URL / tel:" value={c.link||''} onChange={e=>handleArrayEdit('contactData.items',c.id,'link',e.target.value)} onClick={e=>e.stopPropagation()}/>}

                                                  <div className="w-20 h-20 bg-gray-200 p-1 rounded-sm relative">
                                                      {isEditing && <input className="absolute inset-0 bg-black/60 text-white text-[8px] p-1 break-all z-20" placeholder="二维码图片 URL" value={c.qr} onChange={e=>handleArrayEdit('contactData.items',c.id,'qr',e.target.value)} onClick={e=>e.stopPropagation()}/>}
                                                      {(c.link||'').startsWith('tel:') ? <div className="w-full h-full flex flex-col items-center justify-center border border-dashed text-[10px] text-gray-500 bg-white"><i className="ri-phone-line mb-1"></i>{currentLang==='en'?'Call':'直拨热线'}</div> : (c.qr ? <img src={c.qr} className="w-full h-full object-cover" /> : <div className="w-full h-full flex flex-col items-center justify-center border border-dashed text-[10px] text-gray-500 bg-white"><i className="ri-qr-code-line mb-1"></i>{currentLang==='en'?'QR Code':'二维码'}</div>)}
                                                  </div>
                                              </div>
                                              );
                                          })}
                                      </div>
                                      <div className="mt-20 text-center text-xs tracking-widest text-[#313131] border-t border-aman-border/50 pt-8 max-w-2xl mx-auto px-4">
                                          <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="coop" tag="p" className="mb-2 break-all" />
                                          <EditableText data={data} lang={currentLang} isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} field="addr" tag="p" className="break-all" />
                                      </div>
                                  </div>
                              );
                          }
                          
                          if (routeMenu.template === 'video' || routeMenu.id === 'videos') return renderGalleryStyle(routeMenu.id, routeMenu.label, '');
                          if (routeMenu.template === 'image' || routeMenu.id === 'gallery' || routeMenu.id === 'materials') return renderGalleryStyle(routeMenu.id, routeMenu.label, '', true);
                          if (routeMenu.template === 'process' || routeMenu.id.startsWith('process')) return renderProcess(routeMenu.id, routeMenu.label);
                          if (routeMenu.template === 'case' || routeMenu.id === 'projects' || routeMenu.id === 'cloudtext' || routeMenu.id === 'built') return renderGalleryStyle(routeMenu.id, routeMenu.label, '');
                          
                          return null;
                      })()}
                  </main>

                  <footer className={`bg-transparent pt-16 pb-10 border-t border-aman-border/50 transition-all duration-300 ${isEditing ? 'sm:ml-[300px]' : ''}`}>
                      <div className="max-w-[1400px] mx-auto px-4 md:px-8 flex flex-col items-center">
                          {data.logos.footer.type === 'image' && data.logos.footer.imgUrl ? (
                              <img src={data.logos.footer.imgUrl} className="object-contain mb-8" style={{height: data.logos.footer.imgSize || '48px'}} />
                          ) : (
                              <div className="text-center mb-8 cursor-pointer" onClick={isEditing?e=>{e.stopPropagation();setFocusedField({key:'logo_footer',label:'底部Logo'})}:undefined}>
                                  <div className="font-logo text-2xl tracking-widest-xl uppercase text-[#313131]" style={getMergedStyles(data, 'logo_footer')}>{currentLang === 'en' ? (data.logos.footer.textEn || data.logos.footer.text) : data.logos.footer.text}</div>
                                  <div className="text-[10px] tracking-[0.4em] text-gray-400 mt-2">{currentLang === 'en' ? (data.logos.footer.subEn || data.logos.footer.sub) : data.logos.footer.sub}</div>
                              </div>
                          )}
                          
                          <div className="flex space-x-6 mb-8 text-[#313131]">
                              {(data.contactData?.items||[]).map(c => (
                                  <a key={c.id} href={c.link} className="opacity-60 hover:opacity-100 transition-opacity"><i className={`${c.icon} text-xl`}></i></a>
                              ))}
                          </div>

                          <div className="text-[10px] text-gray-500 flex flex-wrap justify-center gap-4 md:gap-6 mb-6 uppercase tracking-widest px-4 text-center">
                              <EditableText data={data} lang={currentLang} isUiText={true} field="footerPrivacy" tag="a" isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} className="hover:text-black transition-colors" />
                              <EditableText data={data} lang={currentLang} isUiText={true} field="footerTerms" tag="a" isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} className="hover:text-black transition-colors" />
                              <EditableText data={data} lang={currentLang} isUiText={true} field="footerIcp" tag="a" isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} className="hover:text-black transition-colors" />
                          </div>
                          <div className="flex flex-col md:flex-row items-center gap-1 text-[10px] text-gray-400 uppercase tracking-widest text-center px-4">
                              <span>© {new Date().getFullYear()} {currentLang === 'en' ? (data.logos.footer.textEn || data.logos.footer.text) : data.logos.footer.text}.</span>
                              <EditableText data={data} lang={currentLang} isUiText={true} field="footerCopy" tag="span" isEditing={isEditing} onEdit={handleEditObj} onFocus={setFocusedField} />
                          </div>
                      </div>
                  </footer>

                  {/* 全局播放器弹窗 */}
                  {playingVideo && (
                      <div className="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center backdrop-blur-md animate-fade-in px-4">
                          <button onClick={()=>setPlayingVideo(null)} className="absolute top-8 right-8 text-white/50 hover:text-white"><i className="ri-close-line text-4xl"></i></button>
                          <div className="w-full max-w-5xl aspect-video rounded-lg overflow-hidden shadow-2xl">
                              <video src={playingVideo} className="w-full h-full object-cover" controls autoPlay playsInline></video>
                          </div>
                      </div>
                  )}

                  {/* 图片灯箱弹窗 */}
                  {lightboxImg && (() => {
                      const bg = data.backgrounds[currentRoute] || { type: 'color', color: '#f3eee7' };
                      return (
                          <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center animate-fade-in px-4" onClick={() => setLightboxImg(null)}>
                              <div className="absolute inset-0" style={{ 
                                  backgroundImage: bg.type === 'gradient' ? bg.color : (bg.type === 'image' ? `url(${bg.imageUrl})` : 'none'), 
                                  backgroundColor: bg.type === 'color' ? bg.color : 'transparent',
                                  backgroundSize: 'cover', backgroundPosition: 'center'
                              }}>
                                  {bg.type === 'particles' && <ParticlesBackground color={bg.color} />}
                              </div>
                              <button onClick={(e)=>{e.stopPropagation(); setLightboxImg(null);}} className="absolute top-6 right-6 md:top-8 md:right-8 text-[#313131] hover:text-black z-10 bg-white/50 hover:bg-white p-2 rounded-full backdrop-blur-md transition-all shadow"><i className="ri-close-line text-2xl"></i></button>
                              <div className="relative w-full max-w-7xl max-h-[90vh] flex justify-center items-center pointer-events-none z-10">
                                  <img src={lightboxImg} className="max-w-full max-h-[85vh] object-contain shadow-2xl rounded pointer-events-auto" onClick={e=>e.stopPropagation()} />
                              </div>
                          </div>
                      );
                  })()}

                  {toastMsg && (
                      <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full shadow-2xl z-[150] transition-opacity font-medium text-sm flex items-center gap-2 animate-fade-in whitespace-nowrap">
                          {toastMsg}
                      </div>
                  )}
              </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
    
    </script>
</body>
</html>
