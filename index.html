                                                    if (routeMenu.id === 'ai_image') {
                              const sizeMap = {
                                  '1024x1024': { w: 1024, h: 1024, label: '1:1 正方形' },
                                  '1024x1792': { w: 1024, h: 1792, label: '3:4 竖版' },
                                  '1792x1024': { w: 1792, h: 1024, label: '4:3 横版' },
                                  '1024x768': { w: 1024, h: 768, label: '4:3 标准' },
                                  '768x1344': { w: 768, h: 1344, label: '9:16 手机' },
                                  '1344x768': { w: 1344, h: 768, label: '16:9 宽屏' }
                              };
                              const selectedSize = sizeMap[aiImageSize] || sizeMap['1024x1024'];
                              
                              const templates = [
                                  { id: 'realistic', label: '写实', icon: 'ri-camera-lens-line', desc: '照片级真实感' },
                                  { id: 'illustration', label: '插画', icon: 'ri-brush-line', desc: '艺术插画风格' },
                                  { id: 'concept', label: '概念', icon: 'ri-lightbulb-line', desc: '概念设计风格' },
                                  { id: 'architecture', label: '建筑', icon: 'ri-building-line', desc: '建筑可视化' },
                                  { id: 'anime', label: '动漫', icon: 'ri-emotion-line', desc: '二次元风格' },
                                  { id: 'product', label: '产品', icon: 'ri-smartphone-line', desc: '产品渲染风格' }
                              ];
                              
                              const handleGenerate = async () => {
                                  if (!aiImagePrompt.trim()) { setAiImageError('请输入提示词'); return; }
                                  if (!apiConfig.apiKey) { setAiImageError('请先在 API 配置面板中设置 API Key'); return; }
                                  setAiImageLoading(true); setAiImageError(''); setAiImageResults([]);
                                  try {
                                      const baseUrl = apiConfig.baseUrl.replace(/\/+$/, '');
                                      let endpoint, body, headers;
                                      if (apiConfig.apiFormat === 'openai') {
                                          endpoint = baseUrl + '/v1/images/generations';
                                          headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiConfig.apiKey };
                                          body = {
                                              model: apiConfig.model === 'custom' ? (apiConfig.customModel || 'dall-e-3') : apiConfig.model,
                                              prompt: aiImagePrompt + (aiImageNegative ? ' --no ' + aiImageNegative : ''),
                                              n: aiImageCount,
                                              size: aiImageSize,
                                              response_format: 'url'
                                          };
                                      } else if (apiConfig.apiFormat === 'stability') {
                                          endpoint = baseUrl + '/v1/generation/' + (apiConfig.model === 'custom' ? (apiConfig.customModel || 'stable-diffusion-xl-1024-v1-0') : apiConfig.model) + '/text-to-image';
                                          headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiConfig.apiKey };
                                          body = {
                                              text_prompts: [{ text: aiImagePrompt, weight: 1 }].concat(aiImageNegative ? [{ text: aiImageNegative, weight: -1 }] : []),
                                              cfg_scale: 7, height: selectedSize.h, width: selectedSize.w, samples: aiImageCount, steps: 30
                                          };
                                      } else {
                                          endpoint = baseUrl;
                                          headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiConfig.apiKey };
                                          body = { prompt: aiImagePrompt, negative_prompt: aiImageNegative, size: aiImageSize, count: aiImageCount };
                                      }
                                      const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
                                      if (!res.ok) { const err = await res.text(); throw new Error('API 错误 ' + res.status + ': ' + err.slice(0, 200)); }
                                      const data = await res.json();
                                      let urls = [];
                                      if (apiConfig.apiFormat === 'openai' && data.data) {
                                          urls = data.data.map(function(d) { return d.url || d.b64_json; });
                                      } else if (apiConfig.apiFormat === 'stability' && data.artifacts) {
                                          urls = data.artifacts.map(function(a) { return 'data:image/png;base64,' + a.base64; });
                                      } else if (data.url) {
                                          urls = [data.url];
                                      } else {
                                          urls = Array.isArray(data) ? data : [];
                                      }
                                      const results = urls.map(function(url) { return { src: url }; });
                                      setAiImageResults(results);
                                      if (aiActiveProjectId) {
                                          const updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { results: results, updatedAt: Date.now() }) : p; });
                                          setAiProjects(updated);
                                          localStorage.setItem('ai_projects', JSON.stringify(updated));
                                      }
                                  } catch (e) {
                                      setAiImageError(e.message);
                                  } finally {
                                      setAiImageLoading(false);
                                  }
                              };
                              
                              const handleNewProject = function() {
                                  if (!aiNewProjectName.trim()) return;
                                  var newProj = {
                                      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                                      name: aiNewProjectName.trim(),
                                      prompt: '',
                                      negative: '',
                                      size: '1024x1024',
                                      count: 1,
                                      template: 'realistic',
                                      results: [],
                                      createdAt: Date.now(),
                                      updatedAt: Date.now()
                                  };
                                  var updated = [newProj].concat(aiProjects).slice(0, 20);
                                  setAiProjects(updated);
                                  setAiActiveProjectId(newProj.id);
                                  setAiNewProjectName('');
                                  setAiShowNewProject(false);
                                  setAiImagePrompt('');
                                  setAiImageNegative('');
                                  setAiImageResults([]);
                                  localStorage.setItem('ai_projects', JSON.stringify(updated));
                              };
                              
                              const handleSelectProject = function(proj) {
                                  setAiActiveProjectId(proj.id);
                                  setAiImagePrompt(proj.prompt || '');
                                  setAiImageNegative(proj.negative || '');
                                  setAiImageSize(proj.size || '1024x1024');
                                  setAiImageCount(proj.count || 1);
                                  setAiTemplate(proj.template || 'realistic');
                                  setAiImageResults(proj.results || []);
                              };
                              
                              const handleDeleteProject = function(projId, e) {
                                  e.stopPropagation();
                                  var updated = aiProjects.filter(function(p) { return p.id !== projId; });
                                  setAiProjects(updated);
                                  localStorage.setItem('ai_projects', JSON.stringify(updated));
                                  if (aiActiveProjectId === projId) {
                                      setAiActiveProjectId(null);
                                      setAiImagePrompt('');
                                      setAiImageResults([]);
                                  }
                              };
                              
                              var activeProject = aiProjects.find(function(p) { return p.id === aiActiveProjectId; });
                              
                              return (
                                  <div className="ai-canvas-wrapper">
                                      <div className="ai-project-bar">
                                          <div className="ai-project-bar-left">
                                              <span className="ai-project-bar-title">
                                                  <i className="ri-magic-line"></i> AI 创作画布
                                              </span>
                                              <div className="ai-project-tabs">
                                                  {aiProjects.slice(0, 10).map(function(p) {
                                                      return (
                                                          <button key={p.id}
                                                              className={'ai-project-tab' + (p.id === aiActiveProjectId ? ' active' : '')}
                                                              onClick={function() { handleSelectProject(p); }}
                                                              title={p.name}>
                                                              <span className="ai-project-tab-name">{p.name}</span>
                                                              <span className="ai-project-tab-del" onClick={function(e) { handleDeleteProject(p.id, e); }}>
                                                                  <i className="ri-close-line"></i>
                                                              </span>
                                                          </button>
                                                      );
                                                  })}
                                              </div>
                                          </div>
                                          <div className="ai-project-bar-right">
                                              <button className="ai-project-add-btn" onClick={function() { setAiNewProjectName(''); setAiShowNewProject(true); }}>
                                                  <i className="ri-add-line"></i> 新建项目
                                              </button>
                                              <button className="ai-config-toggle-btn" onClick={function() { setShowApiConfigPanel(!showApiConfigPanel); }}
                                                  title="API 配置">
                                                  <i className="ri-settings-3-line"></i>
                                              </button>
                                          </div>
                                      </div>
                                      
                                      {aiShowNewProject && (
                                          <div className="ai-modal-overlay" onClick={function() { setAiShowNewProject(false); }}>
                                              <div className="ai-modal" onClick={function(e) { e.stopPropagation(); }}>
                                                  <div className="ai-modal-header">
                                                      <h3><i className="ri-folder-add-line"></i> 新建创作项目</h3>
                                                      <button className="ai-modal-close" onClick={function() { setAiShowNewProject(false); }}>
                                                          <i className="ri-close-line"></i>
                                                      </button>
                                                  </div>
                                                  <div className="ai-modal-body">
                                                      <label className="ai-label">项目名称</label>
                                                      <input className="ai-input" autoFocus
                                                          value={aiNewProjectName}
                                                          onChange={function(e) { setAiNewProjectName(e.target.value); }}
                                                          onKeyDown={function(e) { if (e.key === 'Enter') handleNewProject(); }}
                                                          placeholder="例如：产品海报设计、概念图稿..." />
                                                      <div style={{marginTop:'1rem'}}>
                                                          <label className="ai-label">选择风格模板</label>
                                                          <div className="ai-template-grid">
                                                              {templates.map(function(t) {
                                                                  return (
                                                                      <button key={t.id}
                                                                          className={'ai-template-btn' + (aiTemplate === t.id ? ' active' : '')}
                                                                          onClick={function() { setAiTemplate(t.id); }}>
                                                                          <i className={t.icon}></i>
                                                                          <span>{t.label}</span>
                                                                      </button>
                                                                  );
                                                              })}
                                                          </div>
                                                      </div>
                                                  </div>
                                                  <div className="ai-modal-footer">
                                                      <button className="ai-btn ai-btn-secondary" onClick={function() { setAiShowNewProject(false); }}>取消</button>
                                                      <button className="ai-btn ai-btn-primary" onClick={handleNewProject}
                                                          disabled={!aiNewProjectName.trim()}>
                                                          <i className="ri-check-line"></i> 创建项目
                                                      </button>
                                                  </div>
                                              </div>
                                          </div>
                                      )}
                                      
                                      <div className="ai-canvas-main">
                                          <div className="ai-canvas-left">
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-cpu-line"></i> AI 模型</h3>
                                                  <div className="ai-model-list">
                                                      {[
                                                          { value: 'gpt-image-2', label: 'GPT-image-2', tag: '推荐', desc: 'OpenAI 最新图像生成模型' },
                                                          { value: 'dall-e-3', label: 'DALL-E 3', desc: '高质量图像生成' },
                                                          { value: 'dall-e-2', label: 'DALL-E 2', desc: '经典图像模型' },
                                                          { value: 'sdxl-1.0', label: 'Stable Diffusion XL 1.0', desc: 'Stability AI 旗舰模型' },
                                                          { value: 'sdxl-0.9', label: 'Stable Diffusion XL 0.9', desc: '开源社区首选' },
                                                          { value: 'custom', label: '自定义模型', desc: '使用自定义模型名称' }
                                                      ].map(function(m) {
                                                          const isActive = apiConfig.model === m.value;
                                                          return (
                                                              <button key={m.value}
                                                                  className={'ai-model-item' + (isActive ? ' active' : '')}
                                                                  onClick={function() { saveApiConfig(Object.assign({}, apiConfig, { model: m.value })); }}>
                                                                  <span className="ai-model-radio">
                                                                      {isActive ? <i className="ri-checkbox-circle-fill"></i> : <i className="ri-checkbox-blank-circle-line"></i>}
                                                                  </span>
                                                                  <span className="ai-model-info">
                                                                      <span className="ai-model-label">{m.label}{m.tag ? <span className="ai-model-tag">{m.tag}</span> : null}</span>
                                                                      <span className="ai-model-desc">{m.desc}</span>
                                                                  </span>
                                                              </button>
                                                          );
                                                      })}
                                                  </div>
                                                  {apiConfig.model === 'custom' && (
                                                      <input className="ai-input" style={{marginTop:'0.5rem'}}
                                                          value={apiConfig.customModel || ''}
                                                          onChange={function(e) { saveApiConfig(Object.assign({}, apiConfig, { customModel: e.target.value })); }}
                                                          placeholder="输入自定义模型名称" />
                                                  )}
                                              </div>
                                              
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-palette-line"></i> 风格模板</h3>
                                                  <div className="ai-template-grid">
                                                      {templates.map(function(t) {
                                                          return (
                                                              <button key={t.id}
                                                                  className={'ai-template-btn' + (aiTemplate === t.id ? ' active' : '')}
                                                                  onClick={function() { setAiTemplate(t.id); }}
                                                                  title={t.desc}>
                                                                  <i className={t.icon}></i>
                                                                  <span>{t.label}</span>
                                                              </button>
                                                          );
                                                      })}
                                                  </div>
                                              </div>
                                              
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-text-spacing"></i> 正向提示词</h3>
                                                  <textarea className="ai-input ai-textarea" id="ai-image-prompt-input"
                                                      value={aiImagePrompt}
                                                      onChange={function(e) {
                                                          setAiImagePrompt(e.target.value);
                                                          if (activeProject) {
                                                              var updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { prompt: e.target.value }) : p; });
                                                              setAiProjects(updated);
                                                              localStorage.setItem('ai_projects', JSON.stringify(updated));
                                                          }
                                                      }}
                                                      placeholder={'描述你想要生成的图像，支持中英文...\n例如：一只坐在咖啡馆里的橘猫，阳光透过窗户，写实风格'} />
                                              </div>
                                              
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-forbid-line"></i> 负向提示词</h3>
                                                  <input className="ai-input" style={{minHeight:'auto'}}
                                                      value={aiImageNegative}
                                                      onChange={function(e) {
                                                          setAiImageNegative(e.target.value);
                                                          if (activeProject) {
                                                              var updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { negative: e.target.value }) : p; });
                                                              setAiProjects(updated);
                                                              localStorage.setItem('ai_projects', JSON.stringify(updated));
                                                          }
                                                      }}
                                                      placeholder="不希望出现的内容，如：模糊、变形、多余手指" />
                                              </div>
                                              
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-aspect-ratio-line"></i> 图片尺寸</h3>
                                                  <div className="ai-size-grid">
                                                      {Object.entries(sizeMap).map(function(entry) {
                                                          var key = entry[0], val = entry[1];
                                                          return (
                                                              <button key={key}
                                                                  className={'ai-size-btn' + (aiImageSize === key ? ' active' : '')}
                                                                  onClick={function() {
                                                                      setAiImageSize(key);
                                                                      if (activeProject) {
                                                                          var updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { size: key }) : p; });
                                                                          setAiProjects(updated);
                                                                          localStorage.setItem('ai_projects', JSON.stringify(updated));
                                                                      }
                                                                  }}>
                                                                  <span className="ai-size-label">{val.label}</span>
                                                                  <span className="ai-size-dims">{key}</span>
                                                              </button>
                                                          );
                                                      })}
                                                  </div>
                                              </div>
                                              
                                              <div className="ai-canvas-section">
                                                  <h3><i className="ri-stack-line"></i> 生成数量</h3>
                                                  <div className="ai-count-row">
                                                      {[1,2,3,4].map(function(n) {
                                                          return (
                                                              <button key={n}
                                                                  className={'ai-count-btn' + (aiImageCount === n ? ' active' : '')}
                                                                  onClick={function() {
                                                                      setAiImageCount(n);
                                                                      if (activeProject) {
                                                                          var updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { count: n }) : p; });
                                                                          setAiProjects(updated);
                                                                          localStorage.setItem('ai_projects', JSON.stringify(updated));
                                                                      }
                                                                  }}>{n}</button>
                                                          );
                                                      })}
                                                  </div>
                                              </div>
                                              
                                              <button className="ai-generate-btn" onClick={handleGenerate} disabled={aiImageLoading}>
                                                  {aiImageLoading ? (
                                                      React.createElement(React.Fragment, null,
                                                          React.createElement('span', { className: 'ai-spinner' }),
                                                          ' 生成中...'
                                                      )
                                                  ) : (
                                                      React.createElement(React.Fragment, null,
                                                          React.createElement('i', { className: 'ri-brush-line' }),
                                                          ' 开始生成图片'
                                                      )
                                                  )}
                                              </button>
                                          </div>
                                          
                                          <div className="ai-canvas-right">
                                              {aiImageLoading ? (
                                                  <div className="ai-canvas-loading">
                                                      <div className="ai-canvas-spinner"></div>
                                                      <p className="ai-canvas-loading-title">AI 正在创作中...</p>
                                                      <p className="ai-canvas-loading-sub">
                                                          {aiTemplate === 'architecture' ? '正在构建建筑空间...' :
                                                           aiTemplate === 'illustration' ? '正在绘制艺术画面...' :
                                                           aiTemplate === 'anime' ? '正在渲染动漫风格...' :
                                                           aiTemplate === 'concept' ? '正在构思概念设计...' :
                                                           '正在将你的灵感变为现实...'}
                                                      </p>
                                                      <div className="ai-canvas-loading-bar">
                                                          <div className="ai-canvas-loading-progress"></div>
                                                      </div>
                                                  </div>
                                              ) : aiImageError ? (
                                                  <div className="ai-canvas-error">
                                                      <i className="ri-error-warning-line"></i>
                                                      <p>{aiImageError}</p>
                                                  </div>
                                              ) : aiImageResults.length > 0 ? (
                                                  <div className="ai-canvas-results">
                                                      {aiImageResults.map(function(result, i) {
                                                          return (
                                                              <div key={i} className="ai-canvas-result-item">
                                                                  <img src={result.src} alt={'生成结果 ' + (i+1)} />
                                                                  <div className="ai-canvas-result-overlay">
                                                                      <button onClick={function() {
                                                                          var a = document.createElement('a');
                                                                          a.href = result.src;
                                                                          a.download = 'ai-image-' + Date.now() + '-' + (i+1) + '.png';
                                                                          a.click();
                                                                      }} title="下载">
                                                                          <i className="ri-download-line"></i>
                                                                      </button>
                                                                      <button onClick={function() {
                                                                          navigator.clipboard.writeText(result.src).catch(function() {});
                                                                      }} title="复制链接">
                                                                          <i className="ri-link"></i>
                                                                      </button>
                                                                      <button onClick={function() {
                                                                          var updated = aiProjects.map(function(p) { return p.id === aiActiveProjectId ? Object.assign({}, p, { results: aiImageResults }) : p; });
                                                                          setAiProjects(updated);
                                                                          localStorage.setItem('ai_projects', JSON.stringify(updated));
                                                                      }} title="保存到项目">
                                                                          <i className="ri-save-line"></i>
                                                                      </button>
                                                                  </div>
                                                                  <div className="ai-canvas-result-index">{i+1}</div>
                                                              </div>
                                                          );
                                                      })}
                                                  </div>
                                              ) : (
                                                  <div className="ai-canvas-empty">
                                                      <div className="ai-canvas-empty-icon">
                                                          <i className="ri-image-add-line"></i>
                                                      </div>
                                                      <h3>AI 创作无限画布</h3>
                                                      <p>在左侧输入提示词，选择风格模板，<br/>让 AI 帮你将灵感变为现实</p>
                                                      {aiProjects.length === 0 && (
                                                          <button className="ai-btn ai-btn-primary" style={{marginTop:'1.5rem'}}
                                                              onClick={function() { setAiNewProjectName(''); setAiShowNewProject(true); }}>
                                                              <i className="ri-folder-add-line"></i> 创建第一个项目
                                                          </button>
                                                      )}
                                                  </div>
                                              )}
                                              
                                              {aiImageResults.length > 0 && (
                                                  <div className="ai-canvas-history">
                                                      {aiImageResults.map(function(result, i) {
                                                          return (
                                                              <div key={i} className="ai-canvas-history-item" title={'结果 ' + (i+1)}>
                                                                  <img src={result.src} alt={'缩略图 ' + (i+1)} />
                                                              </div>
                                                          );
                                                      })}
                                                  </div>
                                              )}
                                          </div>
                                      </div>
                                      
                                      {showApiConfigPanel && (
                                          <div className="ai-api-config-overlay">
                                              <div className="ai-api-config-panel">
                                                  <div className="ai-card-header ai-toggle-panel" onClick={function() { setShowApiConfigPanel(false); }}>
                                                      <i className="ri-settings-3-line"></i>
                                                      <span>API 配置</span>
                                                      <i className="ri-close-line" style={{marginLeft:'auto'}}></i>
                                                  </div>
                                                  <div style={{padding:'1.5rem'}}>
                                                      <div className="ai-grid-2" style={{marginBottom:'1rem'}}>
                                                          <div>
                                                              <label className="ai-label">Base URL</label>
                                                              <input className="ai-input" value={apiConfig.baseUrl}
                                                                  onChange={function(e) { saveApiConfig(Object.assign({}, apiConfig, { baseUrl: e.target.value })); }}
                                                                  placeholder="https://api.openai.com" />
                                                          </div>
                                                          <div>
                                                              <label className="ai-label">API Key</label>
                                                              <input type="password" className="ai-input" value={apiConfig.apiKey}
                                                                  onChange={function(e) { saveApiConfig(Object.assign({}, apiConfig, { apiKey: e.target.value })); }}
                                                                  placeholder="sk-..." />
                                                          </div>
                                                      </div>
                                                      <div className="ai-grid-2" style={{marginBottom:'1rem'}}>
                                                          <div>
                                                              <label className="ai-label">API 格式</label>
                                                              <select className="ai-select" value={apiConfig.apiFormat}
                                                                  onChange={function(e) { saveApiConfig(Object.assign({}, apiConfig, { apiFormat: e.target.value })); }}>
                                                                  <option value="openai">OpenAI 兼容</option>
                                                                  <option value="stability">Stability AI</option>
                                                                  <option value="generic">通用格式</option>
                                                              </select>
                                                          </div>
                                                          <div>
                                                              <label className="ai-label">模型</label>
                                                              <select className="ai-select" value={apiConfig.model}
                                                                  onChange={function(e) { saveApiConfig(Object.assign({}, apiConfig, { model: e.target.value })); }}>
                                                                  <option value="gpt-image-2">GPT-image-2</option>
                                                                  <option value="dall-e-3">DALL-E 3</option>
                                                                  <option value="dall-e-2">DALL-E 2</option>
                                                                  <option value="sdxl-1.0">SDXL 1.0</option>
                                                                  <option value="sdxl-0.9">SDXL 0.9</option>
                                                                  <option value="custom">自定义</option>
                                                              </select>
                                                          </div>
                                                      </div>
                                                      <div style={{fontSize:'0.75rem', color:'#64748b', textAlign:'center'}}>
                                                          <i className="ri-information-line"></i> 配置自动保存到浏览器本地存储
                                                      </div>
                                                  </div>
                                              </div>
                                          </div>
                                      )}
                                  </div>
                              );
                          }
                          if (routeMenu.template === 'video' || routeMenu.id === 'videos') return renderGalleryStyle(routeMenu.id, routeMenu.label, '');
                          if (routeMenu.template === 'image' || routeMenu.id === 'gallery' || routeMenu.id === 'materials' || routeMenu.id === 'plants') return renderGalleryStyle(routeMenu.id, routeMenu.label, '', true);
                          if (routeMenu.template === 'process' || routeMenu.id.startsWith('process')) return renderProcess(routeMenu.id, routeMenu.label);
                          if (routeMenu.template === 'case' || routeMenu.id === 'projects' || routeMenu.id === 'cloudtext' || routeMenu.id === 'built') return renderGalleryStyle(routeMenu.id, routeMenu.label, '');
                          
                          return null;
                      })()}
                  </main>

                  <footer className={`bg-transparent pt-16 pb-10 border-t border-aman-border/50 transition-all duration-300 ${isEditing ? 'sm:ml-[300px]' : ''}`}>
                      <div className="max-w-[1400px] mx-auto px-4 md:px-8 flex flex-col items-center">
                          {data.logos.footer.type === 'image' && data.logos.footer.imgUrl ? (
                              <img src={data.logos.footer.imgUrl} className="object-contain mb-8" style={{height: data.logos.footer.imgSize || '48px'}} />
                          ) : (
                              <div className="text-center mb-8 cursor-pointer" onClick={isEditing?e=>{e.stopPropagation();setFocusedField({key:'logo_footer',label:'底部Logo'})}:undefined}>
                                  <div className="font-logo text-2xl tracking-widest-xl uppercase text-[#313131]" style={getMergedStyles(data, 'logo_footer')}>{currentLang === 'en' ? (data.logos.footer.textEn || data.logos.footer.text) : data.logos.footer.text}</div>
                                  <div className="text-[10px] tracking-[0.4em] text-gray-400 mt-2">{currentLang === 'en' ? (data.logos.footer.subEn || data.logos.footer.sub) : data.logos.footer.sub}</div>
                              </div>
                          )}
                          
                          <div className="flex space-x-6 mb-8 text-[#313131]">
                              {(data.contactData?.items||[]).map(c => (
                                  <a key={c.id} href={c.link} className="opacity-60 hover:opacity-100 transition-opacity"><i className={`${c.icon} text-xl`}></i></a>
                              ))}
                          </div>
                          <div className="text-xs text-gray-400 tracking-widest text-center border-t border-aman-border pt-6 w-full flex flex-col md:flex-row justify-center items-center gap-4">
                              <p>&copy; {new Date().getFullYear()} {currentLang === 'en' ? (data.uiTexts?.footerCopyEn || 'PANDAS') : (data.uiTexts?.footerCopy || 'PANDAS')}. All Rights Reserved.</p>
                              <div className="flex gap-4">
                                  <a href="#" className="hover:text-gray-600 transition-colors">{currentLang === 'en' ? (data.uiTexts?.footerPrivacyEn || 'Privacy Policy') : (data.uiTexts?.footerPrivacy || '隐私政策')}</a>
                                  <a href="#" className="hover:text-gray-600 transition-colors">{currentLang === 'en' ? (data.uiTexts?.footerTermsEn || 'Terms of Use') : (data.uiTexts?.footerTerms || '使用条款')}</a>
                                  <a href="#" className="hover:text-gray-600 transition-colors">{currentLang === 'en' ? (data.uiTexts?.footerIcpEn || '') : (data.uiTexts?.footerIcp || '')}</a>
                              </div>
                          </div>
                      </div>
                  </footer>

                  {/* 全局悬浮组件 (播放器/大图) */}
                  {playingVideo && (() => {
                      const parsed = parseVideoUrl(playingVideo);
                      let iframeSrc = parsed.url;
                      if (parsed.isIframe && iframeSrc.includes('bilibili')) {
                          // 核心修复：取消全局弹窗的强制自动播放，改为用户手动点击。
                          // 这是让 B站 iframe 允许放出声音的唯一可靠方式。
                          if (iframeSrc.includes('autoplay=')) {
                              iframeSrc = iframeSrc.replace(/autoplay=\d+/, 'autoplay=0');
                          } else {
                              iframeSrc += (iframeSrc.includes('?') ? '&' : '?') + 'autoplay=0';
                          }
                          if (!iframeSrc.includes('danmaku=')) iframeSrc += '&danmaku=0';
                      }
                      return (
                      <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center backdrop-blur-sm animate-fade-in" onClick={() => setPlayingVideo(null)}>
                          <button onClick={(e)=>{e.stopPropagation(); setPlayingVideo(null);}} className="absolute top-6 right-6 md:top-8 md:right-8 text-white/50 hover:text-white z-10 bg-white/10 hover:bg-white/20 p-2 rounded-full backdrop-blur-md transition-all"><i className="ri-close-line text-2xl"></i></button>
                          <div className="w-full max-w-6xl aspect-video px-4 md:px-12 relative flex justify-center items-center">
                              {parsed.isIframe ? (
                                  <iframe src={iframeSrc} className="w-full h-full max-h-[80vh] shadow-2xl rounded border-0 bg-black" allowFullScreen allow="autoplay; fullscreen"></iframe>
                              ) : (
                                  <video src={parsed.url} controls autoPlay className="w-full h-full max-h-[80vh] shadow-2xl rounded bg-black" onClick={e=>e.stopPropagation()}></video>
                              )}
                          </div>
                      </div>
                      );
                  })()}

                  {lightboxImg && (() => {
                      const bg = data.backgrounds['detail'] || { type: 'color', color: '#ffffff' };
                      return (
                          <div className="fixed inset-0 z-[100] bg-white/90 flex items-center justify-center backdrop-blur-lg animate-fade-in" onClick={() => setLightboxImg(null)}>
                              <div className="absolute inset-0 pointer-events-none" style={{ 
                                  backgroundColor: bg.type === 'color' ? bg.color : 'transparent',
                                  backgroundImage: bg.type === 'gradient' ? bg.color : (bg.type === 'image' ? `url(${bg.imageUrl})` : 'none'),
                                  backgroundSize: 'cover', backgroundPosition: 'center',
                                  opacity: bg.opacity !== undefined ? bg.opacity/100 : 1
                              }}>
                                  {bg.type === 'particles' && <ParticlesBackground color={bg.color} />}
                              </div>
                              <button onClick={(e)=>{e.stopPropagation(); setLightboxImg(null);}} className="absolute top-6 right-6 md:top-8 md:right-8 text-[#313131] hover:text-black z-10 bg-white/50 hover:bg-white p-2 rounded-full backdrop-blur-md transition-all shadow"><i className="ri-close-line text-2xl"></i></button>
                              <div className="relative w-full max-w-7xl max-h-[90vh] flex justify-center items-center pointer-events-none z-10">
                                  <img src={lightboxImg} className="max-w-full max-h-[85vh] object-contain shadow-2xl rounded pointer-events-auto" onClick={e=>e.stopPropagation()} />
                              </div>
                          </div>
                      );
                  })()}

                  {toastMsg && (
                      <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full shadow-2xl z-[150] transition-opacity font-medium text-sm flex items-center gap-2 animate-fade-in whitespace-nowrap">
                          {toastMsg}
                      </div>
                  )}
              </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
    
    
    
    
    
    
    
    </script>
</body>
</html>
